<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thư Gửi Người Ấy</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;700&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #1a0a10;
  font-family: 'Lora', Georgia, serif;
  overflow: hidden;
}

/* --- Hoa rơi --- */
.bg-petals { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }

.petal {
  position: absolute;
  top: -40px;
  font-size: 1.2rem;
  opacity: 0;
  animation: petalFall linear infinite;
}

@keyframes petalFall {
  0%   { opacity: 0;   transform: translateY(0)      rotate(0deg); }
  8%   { opacity: 0.6; }
  92%  { opacity: 0.4; }
  100% { opacity: 0;   transform: translateY(105vh)  rotate(300deg); }
}

/* --- Ánh sáng nền --- */
.glow {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(233,30,99,0.1) 0%, transparent 70%);
  pointer-events: none;
  z-index: 1;
}

/* --- Scene --- */
.scene {
  position: relative;
  z-index: 10;
}

/* --- Phong bì wrapper --- */
.envelope-wrap {
  position: relative;
  width: 520px;
  cursor: pointer;
}

/* --- Phong bì --- */
.envelope {
  position: relative;
  width: 520px;
  height: 360px;
  background: linear-gradient(150deg, #fde8ef 0%, #fbbdd4 100%);
  border-radius: 12px;
  box-shadow: 0 24px 70px rgba(233,30,99,0.35), 0 0 0 1px rgba(212,175,122,0.3);
}

/* Nắp trên — mở bằng rotateX */
.flap-top {
  position: absolute;
  top: 0; left: 0;
  width: 0; height: 0;
  border-left:  260px solid transparent;
  border-right: 260px solid transparent;
  border-top:   180px solid #f9c8db;
  border-radius: 12px 12px 0 0;
  transform-origin: top center;
  /* Bước 1: nắp mở trước — 0.65s */
  transition: transform 0.65s cubic-bezier(.4,0,.2,1),
              border-top-color 0.4s;
  z-index: 4;
  pointer-events: none;
}

/* Cánh trái / phải / đáy */
.flap-left {
  position: absolute; bottom: 0; left: 0;
  width: 0; height: 0;
  border-bottom: 180px solid #f9b8cd;
  border-right:  200px solid transparent;
  border-radius: 0 0 0 12px;
  z-index: 2; pointer-events: none;
}
.flap-right {
  position: absolute; bottom: 0; right: 0;
  width: 0; height: 0;
  border-bottom: 180px solid #f7aac4;
  border-left:   200px solid transparent;
  border-radius: 0 0 12px 0;
  z-index: 2; pointer-events: none;
}
.flap-bottom {
  position: absolute; bottom: 0; left: 0;
  width: 0; height: 0;
  border-right:  260px solid #f48fb1;
  border-left:   260px solid #f48fb1;
  border-bottom: 180px solid #e8799f;
  border-top:    180px solid transparent;
  border-radius: 0 0 12px 12px;
  z-index: 3; pointer-events: none;
}

/* Dấu sáp */
.wax-seal {
  position: absolute;
  bottom: 24px; left: 50%;
  transform: translateX(-50%);
  width: 68px; height: 68px;
  background: radial-gradient(circle at 35% 35%, #e53935, #880e4f);
  border-radius: 50%;
  z-index: 6;
  box-shadow: 0 4px 18px rgba(136,14,79,0.55), 0 0 0 3px rgba(212,175,122,0.55);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.7rem; color: rgba(255,255,255,0.95);
  pointer-events: none;
  /* Bước 1: ẩn cùng lúc nắp mở */
  transition: opacity 0.35s ease, transform 0.35s ease;
}

/* --- Lá thư --- */
.letter {
  position: absolute;
  top: 16px; left: 20px;
  width: 480px; height: 328px;
  background: #fff8f3;
  border-radius: 8px;
  z-index: 2;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 36px 40px;
  text-align: center;
  overflow: hidden;

  /* Bước 2: lá thư trượt lên — bắt đầu SAU khi nắp mở xong (delay 0.6s) */
  transition: transform 0.6s cubic-bezier(.22,.68,0,1.3) 0.6s;
}

/* Watermark mờ */
.letter::before {
  content: "❤";
  position: absolute;
  font-size: 13rem;
  color: rgba(233,30,99,0.04);
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
}

/* Đường kẻ giấy */
.letter::after {
  content: "";
  position: absolute; inset: 0;
  background: repeating-linear-gradient(
    180deg,
    transparent, transparent 31px,
    rgba(233,30,99,0.05) 31px, rgba(233,30,99,0.05) 32px
  );
  pointer-events: none;
}

.letter-inner { position: relative; z-index: 2; width: 100%; }

/* Nội dung thư: ẩn ban đầu, hiện SAU KHI lá thư đã lên xong (delay = 0.6 + 0.6 = 1.2s) */
.letter-salutation {
  font-family: 'Dancing Script', cursive;
  font-size: 1.5rem; color: #880e4f;
  margin-bottom: 10px;
  opacity: 0; transform: translateY(8px);
  transition: opacity 0.4s 1.2s, transform 0.4s 1.2s;
}
.letter-body {
  font-family: 'Lora', serif; font-style: italic;
  font-size: 1.15rem; color: #6b2d4a; line-height: 1.85;
  margin-bottom: 20px;
  opacity: 0; transform: translateY(8px);
  transition: opacity 0.4s 1.4s, transform 0.4s 1.4s;
}
.letter-sign {
  font-family: 'Dancing Script', cursive;
  font-size: 1.3rem; color: #e91e63;
  margin-bottom: 22px;
  opacity: 0; transform: translateY(8px);
  transition: opacity 0.4s 1.6s, transform 0.4s 1.6s;
}
.heart-btn {
  display: inline-flex; align-items: center; gap: 8px;
  background: linear-gradient(135deg, #e91e63, #ad1457);
  color: white;
  font-family: 'Dancing Script', cursive; font-size: 1.1rem;
  padding: 11px 26px; border-radius: 50px; text-decoration: none;
  box-shadow: 0 6px 20px rgba(233,30,99,0.4);
  opacity: 0; transform: translateY(8px);
  transition: opacity 0.4s 1.8s, transform 0.4s 1.8s, box-shadow 0.2s, scale 0.2s;
  position: relative; z-index: 30;
}
.heart-btn:hover {
  box-shadow: 0 10px 30px rgba(233,30,99,0.55);
  scale: 1.05;
}

.btn-heart { animation: beat 1.3s ease-in-out infinite; display: inline-block; }
@keyframes beat {
  0%, 100% { transform: scale(1); }
  25%       { transform: scale(1.3); }
}

/* --- Gợi ý --- */
.hint {
  position: absolute;
  bottom: -50px; left: 50%;
  transform: translateX(-50%);
  color: rgba(255,180,210,0.75);
  font-family: 'Dancing Script', cursive; font-size: 1.2rem;
  white-space: nowrap; pointer-events: none;
  transition: opacity 0.3s;
  animation: hintFloat 1.8s ease-in-out infinite;
}
@keyframes hintFloat {
  0%, 100% { transform: translateX(-50%) translateY(0); }
  50%       { transform: translateX(-50%) translateY(-7px); }
}

/* ===================== OPEN STATE ===================== */

.open .flap-top {
  transform: rotateX(-180deg);
  border-top-color: #f5c0d2;
  z-index: 1;
}

.open .wax-seal {
  opacity: 0;
  transform: translateX(-50%) scale(0.6);
}

.open .letter { transform: translateY(-230px); }

.open .letter-salutation,
.open .letter-body,
.open .letter-sign,
.open .heart-btn {
  opacity: 1;
  transform: translateY(0);
}

.open .hint { opacity: 0; }

/* Khi đóng: ẩn nội dung nhanh, không delay */
.closing .letter-salutation,
.closing .letter-body,
.closing .letter-sign,
.closing .heart-btn {
  opacity: 0 !important;
  transform: translateY(6px) !important;
  transition: opacity 0.15s 0s, transform 0.15s 0s !important;
}
</style>
</head>
<body>

<div class="bg-petals" id="petals"></div>
<div class="glow"></div>

<div class="scene">
  <div class="envelope-wrap" id="envWrap">
    <div class="envelope">
      <div class="flap-top"></div>
      <div class="flap-left"></div>
      <div class="flap-right"></div>
      <div class="flap-bottom"></div>

      <div class="letter">
        <div class="letter-inner">
          <div class="letter-salutation">Gửi</div>
          <div class="letter-body">
            Buồn Ỉa,<br>
            Buồn Ỉa —<br>
            Buồn Ỉa.
          </div>
          <div class="letter-sign">Ấn đê 🔻</div>
          <a href="https://baohaiphong.vn/danh-sach-nhung-nguoi-trung-cu-dai-bieu-hdnd-thanh-pho-hai-phong-nhiem-ky-2026-2031-538363.html"
             target="_blank" class="heart-btn" id="heartBtn">
            <span class="btn-heart">❤</span> Mở điều bí mật
          </a>
        </div>
      </div>

      <div class="wax-seal">♥</div>
    </div>

    <div class="hint">💌 Chạm vào thư để mở</div>
  </div>
</div>

<script>
const wrap    = document.getElementById('envWrap');
const btn     = document.getElementById('heartBtn');
const letter  = wrap.querySelector('.letter');
const flapTop = wrap.querySelector('.flap-top');
const seal    = wrap.querySelector('.wax-seal');
const petalContainer = document.getElementById('petals');

const chars = ['🌸','🌺','❤','💕','🌹','💖'];

function addPetal() {
  const p = document.createElement('div');
  p.className = 'petal';
  p.textContent = chars[Math.floor(Math.random() * chars.length)];
  p.style.left = Math.random() * 100 + 'vw';
  p.style.fontSize = (0.9 + Math.random() * 0.7) + 'rem';
  const dur = 8 + Math.random() * 7;
  p.style.animationDuration = dur + 's';
  p.style.animationDelay   = (Math.random() * dur) + 's';
  petalContainer.appendChild(p);
  setTimeout(() => p.remove(), (dur + 3) * 1000);
}

setInterval(addPetal, 700);
for (let i = 0; i < 8; i++) setTimeout(addPetal, i * 150);

let isAnimating = false;

function openEnvelope() {
  // Reset về transition mặc định cho lúc mở
  letter.style.transition  = 'transform 0.6s cubic-bezier(.22,.68,0,1.3) 0.6s';
  flapTop.style.transition = 'transform 0.65s cubic-bezier(.4,0,.2,1), border-top-color 0.4s';
  seal.style.transition    = 'opacity 0.35s ease, transform 0.35s ease';
  wrap.classList.add('open');
  setTimeout(() => { isAnimating = false; }, 2000);
}

function closeEnvelope() {
  // Bước 1: ẩn nội dung thư nhanh
  wrap.classList.add('closing');

  setTimeout(() => {
    // Bước 2: lá thư trượt vào trước (không delay)
    letter.style.transition  = 'transform 0.55s ease 0s';
    // Bước 3: nắp đóng SAU KHI lá thư đã vào (delay = 0.5s)
    flapTop.style.transition = 'transform 0.6s cubic-bezier(.4,0,.2,1) 0.5s, border-top-color 0.3s 0.5s';
    // Dấu sáp hiện lại sau khi nắp bắt đầu đóng
    seal.style.transition    = 'opacity 0.4s 0.6s, transform 0.4s 0.6s';

    wrap.classList.remove('open');

    // Dọn dẹp sau khi xong
    setTimeout(() => {
      wrap.classList.remove('closing');
      letter.style.transition  = '';
      flapTop.style.transition = '';
      seal.style.transition    = '';
      isAnimating = false;
    }, 1300);
  }, 180); // chờ nội dung ẩn xong
}

wrap.addEventListener('click', (e) => {
  if (e.target.closest('#heartBtn') || isAnimating) return;
  isAnimating = true;
  wrap.classList.contains('open') ? closeEnvelope() : openEnvelope();
});

btn.addEventListener('click', e => e.stopPropagation());
</script>
</body>
</html>
